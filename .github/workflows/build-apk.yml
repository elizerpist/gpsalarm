name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Patch MapLibre GeoJSON tolerance
        run: |
          # Set tolerance: 0 on GeoJSON sources to disable Douglas-Peucker simplification.
          # This preserves polygon circle vertices at all zoom levels.
          CONTROLLER=$(find $HOME/.pub-cache -path '*/maplibre_gl-*/android/src/main/java/org/maplibre/maplibregl/MapLibreMapController.java' | head -1)
          if [ -n "$CONTROLLER" ]; then
            sed -i 's/new GeoJsonOptions().withSynchronousUpdate(dragEnabled)/new GeoJsonOptions().withSynchronousUpdate(dragEnabled).withTolerance(0.0f)/' "$CONTROLLER"
            echo "Patched: $CONTROLLER"
            grep -n 'withTolerance' "$CONTROLLER"
          else
            echo "WARNING: MapLibreMapController.java not found, skipping patch"
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gpsalarm-release
          path: build/app/outputs/flutter-apk/app-release.apk
