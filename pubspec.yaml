name: gpsalarm
description: "GPS-based proximity alarm app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.2
  geolocator: ^13.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  audioplayers: ^6.1.0
  flutter_local_notifications: ^18.0.1
  vibration: ^2.0.1
  file_picker: ^8.1.6
  easy_localization: ^3.0.7
  uuid: ^4.5.1
  geolocator_android: ^4.6.1
  flutter_ringtone_player: ^4.0.0+3
  sqflite: ^2.4.1
  path: ^1.9.0
  shared_preferences: ^2.3.5
  vector_map_tiles: ^7.3.1
  maplibre_gl: ^0.20.0
  connectivity_plus: ^6.1.2
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/l10n/
